<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShortURL — личный сокращатель ссылок</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .card {
      border: none;
      border-radius: 1rem;
      box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.2);
      width: 100%;
      max-width: 600px;
    }
    .btn-primary { background: #667eea; border: none; }
    .btn-success { background: #2ecc71; border: none; }
    .short-link { word-break: break-all; color: #6c5ce7; font-weight: 600; }
    .step-title { font-weight: 600; color: #333; }
    .hidden { display: none !important; }
    .input-group .toggle-password {
      cursor: pointer;
      background: white;
      border: 1px solid #ced4da;
      border-left: none;
      border-radius: 0 0.375rem 0.375rem 0;
      padding: 0.375rem 0.75rem;
      display: flex;
      align-items: center;
    }
    .history-item {
      background: #f8f9fa;
      padding: 0.5rem;
      border-radius: 0.25rem;
      margin-bottom: 0.25rem;
      font-size: 0.9rem;
    }
    .history-title {
      font-weight: 500;
      color: #333;
      word-break: break-word;
    }
    .history-short {
      color: #6c5ce7;
    }
  </style>
</head>
<body>
  <!-- Регистрация -->
  <div id="step-register" class="card p-4 hidden">
    <h3 class="step-title mb-3">Регистрация</h3>
    <div id="register-error" class="alert alert-danger hidden"></div>
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" id="reg-email" class="form-control" placeholder="">
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <div class="input-group">
        <input type="password" id="reg-password" class="form-control" placeholder="">
        <span class="toggle-password" onclick="togglePassword('reg-password', this)">👁</span>
      </div>
    </div>
    <button class="btn btn-primary w-100" onclick="register()">Зарегистрироваться</button>
    <p class="mt-2 text-muted text-center small">Уже есть аккаунт? <a href="#" onclick="showLogin()">Войти</a></p>
  </div>

  <!-- Вход -->
  <div id="step-login" class="card p-4 hidden">
    <h3 class="step-title mb-3">Вход</h3>
    <div id="login-error" class="alert alert-danger hidden"></div>
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" id="login-email" class="form-control" placeholder="">
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <div class="input-group">
        <input type="password" id="login-password" class="form-control" placeholder="">
        <span class="toggle-password" onclick="togglePassword('login-password', this)">👁</span>
      </div>
    </div>
    <button class="btn btn-success w-100" onclick="login()">Войти</button>
    <p class="mt-2 text-muted text-center small">Нет аккаунта? <a href="#" onclick="showRegister()">Зарегистрироваться</a></p>
  </div>

  <!-- Сокращение + история -->
  <div id="step-shorten" class="card p-4 hidden">
    <h3 class="step-title mb-3">Сокращение ссылки</h3>
    <div id="shorten-error" class="alert alert-danger hidden"></div>
    <div class="mb-3">
      <label class="form-label">Поле для длинной ссылки</label>
      <input type="url" id="long-url" class="form-control" placeholder="https://example.com/ваша-ссылка">
    </div>
    <button class="btn btn-dark w-100 mb-3" onclick="shorten()">Сократить</button>
    <div id="result" class="mt-3"></div>
    <hr>
    <h5 class="step-title">История ссылок</h5>
    <div id="history-list" class="mt-2"></div>
    <hr>
    <button class="btn btn-outline-danger btn-sm w-100" onclick="logout()">Выйти</button>
  </div>

  <div id="loading-overlay" class="position-fixed top-0 start-0 w-100 h-100 d-flex justify-content-center align-items-center hidden" style="background: rgba(0,0,0,0.5); z-index: 9999;">
    <div class="spinner-border text-white" role="status"></div>
  </div>

  <script>
    const token = localStorage.getItem('shortener_token');

    function show(id) {
      document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
      document.getElementById(id).classList.remove('hidden');
    }

    function showRegister() { show('step-register'); }
    function showLogin() { show('step-login'); }
    async function showShorten() {
      show('step-shorten');
      await loadHistory();
    }

    if (token) {
      showShorten();
    } else {
      showRegister();
    }

    function loading(show) {
      document.getElementById('loading-overlay').classList.toggle('hidden', !show);
    }

    function setError(step, message) {
      const el = document.getElementById(step + '-error');
      if (message) {
        el.textContent = message;
        el.classList.remove('hidden');
      } else {
        el.classList.add('hidden');
      }
    }

    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = '🙈';
      } else {
        input.type = 'password';
        icon.textContent = '👁';
      }
    }

    async function loadHistory() {
      const currentToken = localStorage.getItem('shortener_token');
      if (!currentToken) return;
      try {
        const res = await fetch('/my-links', {
          headers: { 'Authorization': `Bearer ${currentToken}` }
        });
        if (res.ok) {
          const links = await res.json();
          renderHistory(links);
        }
      } catch (e) {
        console.error(e);
      }
    }

    function renderHistory(links) {
      const list = document.getElementById('history-list');
      if (!links || links.length === 0) {
        list.innerHTML = '<p class="text-muted">Пока нет сокращённых ссылок</p>';
        return;
      }
      list.innerHTML = links.map(item => `
        <div class="history-item">
          <div class="history-title">${escapeHtml(item.title)}</div>
          <div class="history-short">
            <a href="${item.short_url}" target="_blank">${item.short_url}</a>
          </div>
        </div>
      `).join('');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Регистрация (сразу + вход)
    async function register() {
      const login = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      setError('register', '');
      if (!login || !password) {
        setError('register', 'Заполните все поля');
        return;
      }
      loading(true);
      try {
        const res = await fetch(`/register?email=${encodeURIComponent(login)}&password=${encodeURIComponent(password)}`, { method: 'POST' });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Ошибка регистрации');
        }
        // Авто-вход
        const formData = new URLSearchParams();
        formData.append('username', login);
        formData.append('password', password);
        const loginRes = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData });
        if (!loginRes.ok) {
          const err = await loginRes.json();
          throw new Error(err.detail || 'Ошибка входа после регистрации');
        }
        const data = await loginRes.json();
        localStorage.setItem('shortener_token', data.access_token);
        await showShorten();
      } catch (e) {
        setError('register', e.message);
      } finally {
        loading(false);
      }
    }

    async function login() {
      const login = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;
      setError('login', '');
      if (!login || !password) {
        setError('login', 'Заполните все поля');
        return;
      }
      loading(true);
      try {
        const formData = new URLSearchParams();
        formData.append('username', login);
        formData.append('password', password);
        const res = await fetch('/login', { method: 'POST', headers: { 'Content-Type': 'application/x-www-form-urlencoded' }, body: formData });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Ошибка входа');
        }
        const data = await res.json();
        localStorage.setItem('shortener_token', data.access_token);
        await showShorten();
      } catch (e) {
        setError('login', e.message);
      } finally {
        loading(false);
      }
    }

    async function shorten() {
      const longUrl = document.getElementById('long-url').value.trim();
      setError('shorten', '');
      document.getElementById('result').innerHTML = '';
      if (!longUrl) {
        setError('shorten', 'Введите URL');
        return;
      }
      loading(true);
      try {
        const currentToken = localStorage.getItem('shortener_token');
        const res = await fetch(`/shorten?url=${encodeURIComponent(longUrl)}`, {
          headers: { 'Authorization': `Bearer ${currentToken}` }
        });
        if (!res.ok) {
          const err = await res.json();
          throw new Error(err.detail || 'Ошибка сокращения');
        }
        const data = await res.json();
        document.getElementById('result').innerHTML = `
          <div class="alert alert-success">
            ✅ Короткая ссылка:<br>
            <a href="${data.short_url}" target="_blank" class="short-link">${data.short_url}</a>
          </div>`;
        document.getElementById('long-url').value = '';
        // Обновляем историю с сервера
        await loadHistory();
      } catch (e) {
        if (e.message.includes('401') || e.message.includes('Unauthorized')) {
          localStorage.removeItem('shortener_token');
          showLogin();
          setError('login', 'Сессия истекла, войдите заново');
        } else {
          setError('shorten', e.message);
        }
      } finally {
        loading(false);
      }
    }

    function logout() {
      localStorage.removeItem('shortener_token');
      showLogin();
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
