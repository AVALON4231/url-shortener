<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShortURL</title>
  <link rel="stylesheet" href="/static/css/styles.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="app">

  <!-- LOGIN -->
  <div id="step-login" class="card p-4 hidden">
    <h3 class="step-title mb-3">Вход</h3>
    <div id="login-error" class="alert alert-danger hidden"></div>
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" id="login-email" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <div class="input-group">
        <input type="password" id="login-password" class="form-control">
        <span class="toggle-password" onclick="togglePassword('login-password', this)">👁</span>
      </div>
    </div>
    <button class="btn btn-success w-100" onclick="window.login()">Войти</button>
    <p class="mt-2 text-muted text-center small">
      Нет аккаунта? <a href="#" onclick="window.showRegister()">Зарегистрироваться</a>
    </p>
  </div>

  <!-- REGISTER -->
  <div id="step-register" class="card p-4 hidden">
    <h3 class="step-title mb-3">Регистрация</h3>
    <div id="register-error" class="alert alert-danger hidden"></div>
    <div class="mb-3">
      <label class="form-label">Логин</label>
      <input type="text" id="reg-email" class="form-control">
    </div>
    <div class="mb-3">
      <label class="form-label">Пароль</label>
      <div class="input-group">
        <input type="password" id="reg-password" class="form-control">
        <span class="toggle-password" onclick="togglePassword('reg-password', this)">👁</span>
      </div>
    </div>
    <button class="btn btn-primary w-100" onclick="window.register()">Зарегистрироваться</button>
    <p class="mt-2 text-muted text-center small">
      Уже есть аккаунт? <a href="#" onclick="window.showLogin()">Войти</a>
    </p>
  </div>

  <!-- APP -->
  <div id="step-shorten" class="card p-4 hidden">
    <h3 class="step-title mb-3">Сокращение ссылки</h3>
    <div id="shorten-error" class="alert alert-danger hidden"></div>
    <div class="mb-3">
      <label class="form-label">Длинная ссылка</label>
      <input type="url" id="long-url" class="form-control" placeholder="https://example.com/очень-длинная-ссылка">
    </div>
    <button class="btn btn-dark w-100 mb-3" onclick="window.shorten()">Сократить</button>
    <div id="result"></div>
    <hr>
    <h5 class="step-title mb-2">История ссылок</h5>
    <div id="history-list"></div>
    <hr>
    <button class="btn btn-outline-danger btn-sm w-100" onclick="window.logout()">Выйти</button>
  </div>

  <!-- MODAL -->
  <div id="confirm-overlay" class="confirm-overlay">
    <div class="confirm-box">
      <div class="confirm-icon">🗑️</div>
      <div class="confirm-title">Удалить ссылку?</div>
      <div class="confirm-subtitle" id="confirm-subtitle"></div>
      <div class="confirm-actions">
        <button class="btn-confirm-cancel" id="confirm-cancel">Отмена</button>
        <button class="btn-confirm-delete" id="confirm-ok">Удалить</button>
      </div>
    </div>
  </div>

  <!-- LOADING OVERLAY — скрыт через style, без класса hidden -->
  <div id="loading-overlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 9999; display: flex; justify-content: center; align-items: center;">
    <div class="spinner-border text-white" role="status"></div>
  </div>

  <script>
    function togglePassword(inputId, icon) {
      const input = document.getElementById(inputId);
      input.type = input.type === 'password' ? 'text' : 'password';
      icon.textContent = input.type === 'password' ? '👁' : '🙈';
    }
  </script>

  <script type="module" src="/static/js/app.js?v=final"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
