<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShortURL — личный сокращатель ссылок</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            border: none;
            border-radius: 1rem;
            box-shadow: 0 0.5rem 2rem rgba(0,0,0,0.2);
        }
        .btn-primary {
            background: #667eea;
            border: none;
        }
        .btn-success {
            background: #2ecc71;
            border: none;
        }
        .short-link {
            word-break: break-all;
            color: #6c5ce7;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container py-5">
        <div class="text-center mb-4">
            <h1 class="text-white">🔗 ShortURL</h1>
            <p class="text-white-50">Персональный сокращатель ссылок с аналитикой</p>
        </div>

        <!-- Панель авторизации -->
        <div class="card p-4 mb-4">
            <h4 class="mb-3">👤 Аккаунт</h4>
            <div class="row g-3">
                <div class="col-md-5">
                    <input type="email" id="email" class="form-control" placeholder="Email">
                </div>
                <div class="col-md-5">
                    <input type="password" id="password" class="form-control" placeholder="Пароль">
                </div>
                <div class="col-md-2 d-grid gap-2">
                    <button class="btn btn-primary" onclick="register()">Регистрация</button>
                    <button class="btn btn-success" onclick="login()">Войти</button>
                    <button class="btn btn-outline-danger btn-sm" onclick="logout()">Выйти</button>
                </div>
            </div>
            <div class="mt-2">
                <span id="authStatus" class="text-muted small"></span>
            </div>
        </div>

        <!-- Сокращение ссылки -->
        <div id="shortenBlock" class="card p-4 mb-4" style="display: none;">
            <h4 class="mb-3">✂️ Новая ссылка</h4>
            <div class="input-group">
                <input type="url" id="longUrl" class="form-control form-control-lg" placeholder="https://example.com/ваша-длинная-ссылка">
                <button class="btn btn-dark" onclick="shorten()">Сократить</button>
            </div>
            <div id="result" class="mt-3"></div>
        </div>

        <div id="loading" class="text-center text-white d-none">
            <div class="spinner-border" role="status"></div>
            <p>Выполняю...</p>
        </div>
    </div>

    <script>
        // Теперь запросы идут на текущий сервер
        let token = localStorage.getItem('shortener_token') || '';
        if (token) updateUI();

        async function api(method, endpoint, body = null, auth = false) {
            const headers = { 'Content-Type': 'application/json' };
            if (auth && token) headers['Authorization'] = `Bearer ${token}`;
            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);
            const res = await fetch(endpoint, options);
            if (!res.ok) {
                const err = await res.json();
                throw new Error(err.detail || 'Ошибка запроса');
            }
            return res.json();
        }

        async function register() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) return alert('Введите email и пароль');
            try {
                const data = await api('POST', `/register?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`);
                alert(data.message);
            } catch (e) { alert(e.message); }
        }

        async function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            if (!email || !password) return alert('Введите email и пароль');
            try {
                const formData = new URLSearchParams();
                formData.append('username', email);
                formData.append('password', password);
                const res = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Ошибка входа');
                }
                const data = await res.json();
                token = data.access_token;
                localStorage.setItem('shortener_token', token);
                updateUI();
            } catch (e) { alert(e.message); }
        }

        function logout() {
            token = '';
            localStorage.removeItem('shortener_token');
            updateUI();
        }

        function updateUI() {
            const authStatus = document.getElementById('authStatus');
            const shortenBlock = document.getElementById('shortenBlock');
            if (token) {
                authStatus.innerHTML = '<span class="badge bg-success">Авторизован</span>';
                shortenBlock.style.display = 'block';
            } else {
                authStatus.innerHTML = '';
                shortenBlock.style.display = 'none';
            }
        }

        async function shorten() {
            const longUrl = document.getElementById('longUrl').value.trim();
            if (!longUrl) return alert('Введите URL');
            if (!token) return alert('Сначала войдите');
            try {
                document.getElementById('loading').classList.remove('d-none');
                const data = await api('GET', `/shorten?url=${encodeURIComponent(longUrl)}`, null, true);
                const resultDiv = document.getElementById('result');
                resultDiv.innerHTML = `
                    <div class="alert alert-success">
                        ✅ Короткая ссылка: <a href="${data.short_url}" target="_blank" class="short-link">${data.short_url}</a>
                        <br><small class="text-muted">Код: ${data.short_code}</small>
                    </div>`;
                document.getElementById('longUrl').value = '';
            } catch (e) { alert(e.message); }
            finally { document.getElementById('loading').classList.add('d-none'); }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
